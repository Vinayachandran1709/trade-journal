providers = ["python"]

[phases.setup]
aptPkgs = ["python3", "python3-pip", "python3-dev", "gcc", "libpq-dev"]

[phases.install]
cmds = ["pip3 install -r backend/requirements.txt"]

[start]
cmd = "cd backend && python3 -m alembic upgrade head && python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
